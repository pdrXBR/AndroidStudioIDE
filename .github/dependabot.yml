version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns: ["androidx.*"]
      compose:
        patterns: ["androidx.compose.*"]
      testing:
        patterns: ["junit*", "io.mockk*", "app.cash.turbine*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
